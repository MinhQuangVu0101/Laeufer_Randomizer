<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volleyball Team Generator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Volleyball Team Generator</h1>
            <p class="subtitle">Faire Teams per Knopfdruck</p>
        </header>

        <!-- Roster Management -->
        <div class="roster-bar">
            <select id="roster-select">
                <option value="">-- Kader laden --</option>
            </select>
            <button class="btn btn-sm" onclick="saveRoster()">Speichern</button>
            <button class="btn btn-sm btn-muted" onclick="deleteRoster()">Entfernen</button>
        </div>

        <!-- Position Inputs -->
        <div class="input-grid">
            <div class="position-card">
                <div class="position-header">
                    <span class="position-badge">AA</span>
                    <span>Aussenangreifer</span>
                </div>
                <textarea id="aussen" placeholder="Ein Name pro Zeile"></textarea>
            </div>

            <div class="position-card">
                <div class="position-header">
                    <span class="position-badge">MB</span>
                    <span>Mittelblock</span>
                </div>
                <textarea id="mitte" placeholder="Ein Name pro Zeile"></textarea>
            </div>

            <div class="position-card">
                <div class="position-header">
                    <span class="position-badge">ZS</span>
                    <span>Zuspieler</span>
                </div>
                <textarea id="zuspieler" placeholder="Ein Name pro Zeile"></textarea>
            </div>

            <div class="position-card">
                <div class="position-header">
                    <span class="position-badge">LI</span>
                    <span>Libero</span>
                </div>
                <textarea id="libero" placeholder="Ein Name pro Zeile"></textarea>
                <div class="libero-options">
                    <label><input type="checkbox" id="team1-no-libero"> Team 1 ohne Libero</label>
                    <label><input type="checkbox" id="team2-no-libero"> Team 2 ohne Libero</label>
                </div>
            </div>

            <div class="position-card">
                <div class="position-header">
                    <span class="position-badge">DI</span>
                    <span>Diagonal</span>
                </div>
                <textarea id="diagonal" placeholder="Ein Name pro Zeile"></textarea>
            </div>
        </div>

        <!-- Actions -->
        <div class="actions">
            <button class="btn btn-primary" onclick="generateTeams()">Teams generieren</button>
            <button class="btn btn-muted" onclick="clearAllData()">Alles loeschen</button>
        </div>

        <!-- Error/Info Messages -->
        <div id="info" class="info-box" style="display:none;"></div>

        <!-- Results -->
        <div id="results" class="results" style="display:none;">
            <div class="results-header">
                <h2>Generierte Teams</h2>
                <button class="btn btn-sm" onclick="copyTeams()">Kopieren</button>
            </div>

            <div class="teams-grid">
                <div class="team-card">
                    <div class="team-title">Team 1</div>
                    <div id="team1-content"></div>
                    <div class="team-count" id="team1-count"></div>
                </div>
                <div class="team-card">
                    <div class="team-title">Team 2</div>
                    <div id="team2-content"></div>
                    <div class="team-count" id="team2-count"></div>
                </div>
            </div>

            <div id="bench-section" class="bench" style="display:none;">
                <h3>Auswechselbank</h3>
                <div id="bench-content"></div>
            </div>
        </div>

        <!-- History -->
        <div id="history-section" class="history" style="display:none;">
            <h3>Letzte Generierungen</h3>
            <div id="history-content"></div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="script.js"></script>
</body>
</html>
